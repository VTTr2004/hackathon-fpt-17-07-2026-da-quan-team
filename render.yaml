services:
  - type: web
    name: startup-lens-api
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: checksPass
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTO_CREATE_TABLES
        value: true
      - key: SEED_SAMPLE_DATA
        value: true
      - key: SAMPLE_DATA_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MAX_UPLOAD_MB
        value: 25
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_OCR_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_TIMEOUT_SECONDS
        value: 60
      - key: GOONG_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false


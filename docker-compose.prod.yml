name: startup-lens

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-startup_due_diligence}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    image: ${GHCR_REPOSITORY:?GHCR_REPOSITORY must be set}-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-60}
      GOONG_API_KEY: ${GOONG_API_KEY:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/app/uploads
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    image: ${GHCR_REPOSITORY:?GHCR_REPOSITORY must be set}-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  uploads_data:
